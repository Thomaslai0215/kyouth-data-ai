services:
  frontend:
    image: frontend:1.0
    pull_policy: build
    build:
      context: ./frontend
    # Host port (left) must match FRONTEND_PORT in .env
    ports:
      - "${FRONTEND_PORT:-8000}:8000"
    environment:
      # Port in BACKEND_URL must match BACKEND_PORT in .env / backend ports (left side)
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8001/chat}
    depends_on:
      - backend

  backend:
    image: backend:1.0
    pull_policy: build
    build:
      context: ./backend
    # Host port (left) must match BACKEND_PORT in .env and the port in BACKEND_URL
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      CHAT_MODEL: ${CHAT_MODEL:-gemini-3.1-flash-lite}
      OLLAMA_BASE_URL: http://ollama:11434
    secrets:
      - google_api_key
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    gpus: all
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

secrets:
  google_api_key:
    file: ./secrets/google_api_key.txt

volumes:
  ollama_data:
