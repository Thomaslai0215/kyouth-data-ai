services:
  frontend:
    build: ./frontend
    ports:
      - "8000:8000"
    environment:
      BACKEND_URL: http://localhost:8001/chat
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama   # service name, not host.docker.internal


  ollama:
    image: ollama/ollama
    gpus: all
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
