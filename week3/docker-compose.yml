services:
  frontend:
    build: ./frontend
    ports:
      - "8000:8000"
    environment:
      BACKEND_URL: http://localhost:8001/chat
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      CHAT_MODEL: ${CHAT_MODEL:-gemini-2.5-flash}
      OLLAMA_BASE_URL: http://ollama:11434
    secrets:
      - google_api_key
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    gpus: all
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

secrets:
  google_api_key:
    file: ./secrets/google_api_key.txt

volumes:
  ollama_data:
